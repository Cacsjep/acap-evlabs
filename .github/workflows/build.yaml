name: builder

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to use for artifacts and release (e.g. v0.1.0)'
        required: true
        default: 'v0.0.0-manual'

env:
  CMD: 'goxisbuilder -appdir ./ax_voicer -ignore ".git web build node_modules .github"'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target:
          - { name: "aarch64", args: '-sdk "12.5.0" -ubunutu "24.04" -manifest "manifest.json" -tags "prod" -arch aarch64 -upx=false -files "html"' }
          - { name: "armv7hf", args: '-sdk "12.5.0" -ubunutu "24.04" -manifest "manifest.json" -tags "prod" -arch armv7hf -upx=false -files "html"' }

    env:
      FILE_PREFIX: Voicer_${{ inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build
          rm -rf node_modules

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: docker/setup-buildx-action@v3

      - name: Install goxisbuilder
        run: go install github.com/Cacsjep/goxisbuilder@v1.3.1

      - run: mkdir out

      - name: Build .eap (${{ matrix.target.name }})
        run: |
          ${{ env.CMD }} ${{ matrix.target.args }}
          mv build/*.eap out/${{ env.FILE_PREFIX }}_${{ matrix.target.name }}.eap

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.name }}
          path: out/*.eap
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: downloads

      - name: List artifacts
        run: ls -la downloads/**/*.eap

      - name: Bundle .eaps into single zip
        run: zip -jr Voicer_${{ inputs.tag || github.ref_name }}.zip downloads/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            downloads/**/*.eap
            Voicer_${{ inputs.tag || github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
