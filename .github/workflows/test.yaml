name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Go vet (host+mock)
        run: go vet -tags=host,mock ./...

      - name: Go test (host+mock)
        run: go test -tags=host,mock -race ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm --prefix web ci

      - name: Build
        run: npm --prefix web run build
